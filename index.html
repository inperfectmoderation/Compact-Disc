<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Disc</title>
    <style>
        header{
            background-color:rgb(181, 169, 223);
            color:black;
            text-align:center;
            max-width:800px;
            margin: 0 auto;
            padding:16px;
            border: 5px solid rgb(153, 134, 219);
        }
        main{
            background-color: white;
            color: black;
            max-width:800px;
            margin: 0 auto;
            padding:16px;
            display:flex;
        }
        img{
            width:140px;
            height:140px;
        }
        .artigo-autor{
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Compact Disc</h1>
        <p>Origem, historia e importancia</p>
    </header>
    <main>
        <img src="cd1.jpg">
        <div>
            <h2>Meu primeiro post</h2>
            <p class="artigo-autor">Por: Roberto</p>
            <p>Boas-vindas ao meu primeiro Blog!</p>
            <button>.<span>0</span></button>
            <button>.<span>0</span></button>
        </div>
    </main>
</body>
<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function(botao){
        botao.addEventListener("click", botaoClicado);
        function botaoClicado(){
            console.log("fui clicado");
            let texto= botao.querySelector("span");
            texto.textContent++;
        }

    }
)
</script>
</html>
